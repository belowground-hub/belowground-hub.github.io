<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belowground</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=1">
</head>
<body>

    <header>
        <div class="container header-inner">
            <div class="logo-area">
                <h1>BELOWGROUND</h1>
                <small>Resource Hub</small>
            </div>
            <div class="nav-tabs">
                <a href="{{ url_for('index') }}">HOME</a>
                <a href="{{ url_for('upload') }}">UPLOAD</a>
                <a href="{{ url_for('archive') }}">ARCHIVE</a>
                
                <div class="dropdown">
                    <a style="cursor: pointer;">DIRECTORY ▼</a>
                    <div class="dropdown-content">
                        <a href="{{ url_for('bands') }}">Bands & Artists</a>
                        <a href="{{ url_for('venues') }}">Venues</a>
                        <a href="{{ url_for('crew') }}">Crew & Sound</a>
                    </div>
                </div>
            
                <div class="dropdown">
                    <a style="cursor: pointer;">RESOURCES ▼</a>
                    <div class="dropdown-content">
                        <a href="{{ url_for('marketing') }}">Marketing Methods</a>
                        <a href="{{ url_for('zines') }}">Zine Library</a>
                        <a href="{{ url_for('venue_guide') }}">Start a Venue</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Belowground</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/upload.js') }}"></script>
    <script>
        // Makes dropdown menus work on mobile taps
        document.querySelectorAll('.dropdown').forEach(dropdown => {
            dropdown.addEventListener('click', function(e) {
                // Only run this on mobile screen sizes
                if (window.innerWidth <= 768) {
                    const content = this.querySelector('.dropdown-content');
                    
                    // If it's already open, close it. Otherwise, open it.
                    if (content.style.display === 'block') {
                        content.style.display = 'none';
                    } else {
                        // Close any other open dropdowns first to keep it clean
                        document.querySelectorAll('.dropdown-content').forEach(c => c.style.display = 'none');
                        content.style.display = 'block';
                    }
                }
            });
        });
    </script>
</body>
</html>
